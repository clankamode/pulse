<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Geo Location</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Russo+One&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: only light;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      margin: 0;
      padding: 0;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f5f5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .geo {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.45em;
      flex-wrap: wrap;
      max-width: 100vw;
      padding: 0.18em 0.4em;
      white-space: nowrap;
      line-height: 1;
      font-family: var(--font-family, 'Inter', sans-serif);
      font-size: var(--font-size, 2.2rem);
      color: var(--overlay-color, #f5f5f5);
      letter-spacing: -0.02em;
    }

    .city {
      font-size: 1em;
      font-weight: 700;
    }

    .value {
      font-size: 0.82em;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      opacity: 0.92;
    }

    .separator {
      font-size: 0.72em;
      font-weight: 400;
      opacity: 0.35;
      transform: translateY(-0.02em);
    }

    .weather {
      text-transform: none;
    }

    .hb {
      position: fixed;
      bottom: 4px;
      right: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      animation: hb 4s ease-in-out infinite;
    }

    @keyframes hb {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.05; }
    }
  </style>
</head>
<body>
  <div class="geo" id="geo" aria-live="polite"></div>
  <div class="hb" title="Pulse overlay active"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const knownFonts = {
      mono: {
        family: "'JetBrains Mono', monospace",
        href: 'https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap'
      },
      inter: {
        family: "'Inter', sans-serif",
        href: 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap'
      },
      russo: {
        family: "'Russo One', sans-serif",
        href: 'https://fonts.googleapis.com/css2?family=Russo+One&display=swap'
      }
    };
    const geo = document.getElementById('geo');
    const city = (params.get('city') || '').trim();
    const fontParam = (params.get('font') || 'inter').trim();
    const colorParam = (params.get('color') || 'ffffff').trim();
    const sizeParam = Number.parseFloat(params.get('size') || '2.2');
    const showWeather = params.get('show_weather') !== '0';
    const showTime = params.get('show_time') !== '0';
    const timezoneParam = (params.get('timezone') || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC').trim();
    const units = params.get('units') === 'metric' ? 'metric' : 'imperial';
    const weatherCacheTtl = 10 * 60 * 1000;

    let currentTime = '';
    let currentWeather = null;

    function sanitizeColor(value) {
      const normalized = value.replace(/^#/, '');
      return /^[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(normalized) ? `#${normalized}` : '#ffffff';
    }

    function sanitizeSize(value) {
      return Number.isFinite(value) && value > 0 ? `${value}rem` : '2.2rem';
    }

    function buildCustomFont(fontName) {
      const cleaned = fontName.replace(/\+/g, ' ').trim().replace(/\s+/g, ' ');
      if (!cleaned || /[^a-zA-Z0-9 -]/.test(cleaned)) {
        return knownFonts.inter;
      }

      return {
        family: `'${cleaned}', sans-serif`,
        href: `https://fonts.googleapis.com/css2?family=${encodeURIComponent(cleaned).replace(/%20/g, '+')}:wght@400;500;600;700&display=swap`
      };
    }

    function ensureFont(fontName) {
      const fontConfig = knownFonts[fontName] || buildCustomFont(fontName);
      const fontHref = fontConfig.href;

      if (!document.querySelector(`link[data-font-href="${fontHref}"]`)) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = fontHref;
        link.setAttribute('data-font-href', fontHref);
        document.head.appendChild(link);
      }

      return fontConfig.family;
    }

    function buildTimeFormatter(timeZone) {
      try {
        return new Intl.DateTimeFormat('en-GB', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false,
          timeZone
        });
      } catch (error) {
        return new Intl.DateTimeFormat('en-GB', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        });
      }
    }

    function readWeatherCache(cacheKey) {
      try {
        const raw = window.localStorage.getItem(cacheKey);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function writeWeatherCache(cacheKey, weatherData) {
      try {
        window.localStorage.setItem(cacheKey, JSON.stringify(weatherData));
      } catch (error) {
        return;
      }
    }

    function render() {
      const parts = [];

      if (city) {
        parts.push(`<span class="city">${city}</span>`);
      }

      if (showTime && currentTime) {
        parts.push(`<span class="value time">${currentTime}</span>`);
      }

      if (showWeather && currentWeather) {
        const degreeUnit = units === 'metric' ? 'C' : 'F';
        const condition = currentWeather.condition ? ` ${currentWeather.condition}` : '';
        parts.push(`<span class="value weather">${currentWeather.temperature}&deg;${degreeUnit}${condition}</span>`);
      }

      geo.innerHTML = parts.map((part, index) => {
        if (index === 0) {
          return part;
        }

        return `<span class="separator" aria-hidden="true">&middot;</span>${part}`;
      }).join('');
    }

    async function fetchWeather() {
      if (!showWeather || !city) {
        currentWeather = null;
        render();
        return;
      }

      const cacheKey = `pulse-geo-weather:${city.toLowerCase()}:${units}`;
      const cached = readWeatherCache(cacheKey);
      const now = Date.now();

      if (cached && typeof cached.fetchedAt === 'number' && now - cached.fetchedAt < weatherCacheTtl && cached.data) {
        currentWeather = cached.data;
        render();
        return;
      }

      try {
        const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`, { mode: 'cors' });
        if (!response.ok) {
          currentWeather = null;
          render();
          return;
        }

        const payload = await response.json();
        const current = payload && Array.isArray(payload.current_condition) ? payload.current_condition[0] : null;
        const condition = current && Array.isArray(current.weatherDesc) && current.weatherDesc[0] ? current.weatherDesc[0].value : '';
        const temperature = units === 'metric' ? current && current.temp_C : current && current.temp_F;

        if (temperature === undefined || temperature === null || temperature === '') {
          currentWeather = null;
          render();
          return;
        }

        currentWeather = {
          temperature,
          condition: (condition || '').trim()
        };
        writeWeatherCache(cacheKey, {
          fetchedAt: now,
          data: currentWeather
        });
        render();
      } catch (error) {
        currentWeather = null;
        render();
      }
    }

    function updateTime(formatter) {
      if (!showTime) {
        currentTime = '';
        render();
        return;
      }

      currentTime = formatter.format(new Date());
      render();
    }

    document.documentElement.style.setProperty('--font-family', ensureFont(fontParam));
    document.documentElement.style.setProperty('--font-size', sanitizeSize(sizeParam));
    document.documentElement.style.setProperty('--overlay-color', sanitizeColor(colorParam));

    const timeFormatter = buildTimeFormatter(timezoneParam);
    updateTime(timeFormatter);
    if (showTime) {
      window.setInterval(() => updateTime(timeFormatter), 1000);
    }
    fetchWeather();
    if (showWeather && city) {
      window.setInterval(fetchWeather, 60000);
    }
  </script>
</body>
</html>
