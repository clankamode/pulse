<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=JetBrains+Mono:wght@700&family=Russo+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .timer {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .segment {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .digits {
      font-variant-numeric: tabular-nums;
    }
    .sep {
      opacity: 0.5;
    }
    .label {
      font-size: 0.25em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-top: 2px;
    }
    /* Pulse heartbeat — tiny dot in corner */
    .heartbeat {
      position: fixed;
      bottom: 4px;
      right: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff88;
      opacity: 0.4;
      animation: hb 3s ease-in-out infinite;
    }
    @keyframes hb {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.1; }
    }
  </style>
</head>
<body>
  <div class="timer" id="timer"></div>
  <div class="heartbeat" title="Pulse overlay active"></div>
  <script>
    const p = new URLSearchParams(location.search);
    const mode = p.get('mode') || 'down';
    const dateStr = p.get('date') || '';
    const timeStr = p.get('time') || '12:00';
    const font = p.get('font') || 'mono';
    const color = '#' + (p.get('color') || 'ffffff');
    const size = (p.get('size') || '4') + 'rem';
    const showLabels = p.get('labels') !== '0';

    const fonts = {
      mono: "'JetBrains Mono', monospace",
      inter: "'Inter', sans-serif",
      russo: "'Russo One', sans-serif"
    };

    const target = dateStr ? new Date(`${dateStr}T${timeStr}`) : new Date();
    const el = document.getElementById('timer');
    el.style.fontFamily = fonts[font] || fonts.mono;
    el.style.fontSize = size;
    el.style.color = color;

    function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

    function render() {
      const now = Date.now();
      const targetMs = target.getTime();
      let diff = mode === 'down' ? targetMs - now : now - targetMs;
      if (diff < 0) diff = 0;

      const totalSec = Math.floor(diff / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      let html = '';
      html += `<div class="segment"><span class="digits">${pad(h)}</span>${showLabels ? '<span class="label">Hours</span>' : ''}</div>`;
      html += `<span class="sep">:</span>`;
      html += `<div class="segment"><span class="digits">${pad(m)}</span>${showLabels ? '<span class="label">Minutes</span>' : ''}</div>`;
      html += `<span class="sep">:</span>`;
      html += `<div class="segment"><span class="digits">${pad(s)}</span>${showLabels ? '<span class="label">Seconds</span>' : ''}</div>`;

      el.innerHTML = html;
    }

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
