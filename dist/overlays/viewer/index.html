<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Viewer Count</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=JetBrains+Mono:wght@700&family=Russo+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .viewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .count {
      font-variant-numeric: tabular-nums;
    }
    .platform-icon {
      display: flex;
      align-items: center;
    }
    .platform-icon svg { width: 1em; height: 1em; }
    .stale .count { opacity: 0.5; }
    .stale::after {
      content: '⏳';
      font-size: 0.4em;
      margin-left: 8px;
      opacity: 0.5;
    }
    .heartbeat {
      position: fixed;
      bottom: 4px;
      right: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff88;
      opacity: 0.4;
      animation: hb 3s ease-in-out infinite;
    }
    @keyframes hb {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.1; }
    }
    .error-state {
      font-size: 1rem;
      color: #ff4444;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>
  <div class="viewer" id="viewer">
    <span class="count">---</span>
  </div>
  <div class="heartbeat" title="Pulse overlay active"></div>
  <script>
    const p = new URLSearchParams(location.search);
    const platform = p.get('platform') || 'twitch';
    const channel = p.get('channel') || '';
    const font = p.get('font') || 'mono';
    const color = '#' + (p.get('color') || 'ffffff');
    const size = (p.get('size') || '4') + 'rem';
    const showIcon = p.get('icon') !== '0';

    const fonts = {
      mono: "'JetBrains Mono', monospace",
      inter: "'Inter', sans-serif",
      russo: "'Russo One', sans-serif"
    };

    const icons = {
      twitch: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`,
      youtube: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12z"/></svg>`,
      kick: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.333 0v24h5.338V14.68l2.66-2.67 5.338 12h5.998L13.33 9.34 20.667 0h-5.998l-5.998 7.33V0z"/></svg>`,
      combined: ``
    };

    const el = document.getElementById('viewer');
    el.style.fontFamily = fonts[font] || fonts.mono;
    el.style.fontSize = size;
    el.style.color = color;

    let lastCount = null;
    let lastFetchOk = 0;

    function render(count, stale) {
      let html = '';
      if (showIcon && icons[platform]) {
        html += `<span class="platform-icon">${icons[platform]}</span>`;
      }
      const formatted = count !== null ? count.toLocaleString() : '---';
      el.innerHTML = html + `<span class="count">${formatted}</span>`;
      el.classList.toggle('stale', stale);
    }

    // For demo / when no API is available, show a simulated count
    // In production this would hit the Pulse API worker
    async function fetchCount() {
      if (!channel) {
        render(null, false);
        return;
      }

      try {
        // Try our API proxy first
        const resp = await fetch(`/api/viewers?platform=${platform}&channel=${encodeURIComponent(channel)}`);
        if (resp.ok) {
          const data = await resp.json();
          lastCount = data.count;
          lastFetchOk = Date.now();
          render(lastCount, false);
          return;
        }
      } catch(e) {}

      // Fallback: show last known count as stale
      if (lastCount !== null) {
        render(lastCount, Date.now() - lastFetchOk > 60000);
      } else {
        // Demo mode: show simulated count
        lastCount = Math.floor(Math.random() * 5000) + 100;
        render(lastCount, false);
      }
    }

    fetchCount();
    setInterval(fetchCount, 15000); // Poll every 15s
  </script>
</body>
</html>
